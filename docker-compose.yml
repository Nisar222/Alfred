services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jamal_dialler}
      POSTGRES_USER: ${POSTGRES_USER:-jamal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_INITDB_ARGS: --data-checksums
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6
    security_opt:
      - no-new-privileges:true

  api:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-jamal}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-jamal_dialler}
      REDIS_URL: redis://redis:6379/0
      CALL_PROVIDER: ${CALL_PROVIDER:-simulator}
      MAX_CONCURRENT_CALLS: ${MAX_CONCURRENT_CALLS:-8}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8000}
      THREECX_BASE_URL: ${THREECX_BASE_URL:-}
      THREECX_APP_ID: ${THREECX_APP_ID:-}
      THREECX_API_KEY: ${THREECX_API_KEY:-}
      THREECX_CONTROL_EXTENSION: ${THREECX_CONTROL_EXTENSION:-}
      THREECX_TEST_DESTINATION: ${THREECX_TEST_DESTINATION:-}
      THREECX_TEST_CALL_ENABLED: ${THREECX_TEST_CALL_ENABLED:-false}
      THREECX_TEST_CALL_TIMEOUT_SECONDS: ${THREECX_TEST_CALL_TIMEOUT_SECONDS:-45}
      PRERECORDED_MESSAGE_PATH: ${PRERECORDED_MESSAGE_PATH:-/app/media/test-message.mp3}
    volumes:
      - ./media:/app/media:ro
    ports:
      # Bind only to loopback; put a TLS reverse proxy in front of this service.
      - "${API_BIND_ADDRESS:-127.0.0.1}:${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
  redis_data:
